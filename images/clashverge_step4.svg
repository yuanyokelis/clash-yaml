<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260">
  <rect width="100%" height="100%" fill="#fff0f6" />
  <text x="30" y="48" font-size="20" font-family="Arial" fill="#111">Clash Verge 导入（示意） — 步骤 4</text>
  <text x="30" y="88" font-size="16" font-family="Arial" fill="#333">确认 DNS 模式与本地设置：fake-ip / redir-host 等（视客户端支持）。</text>
  <rect x="30" y="110" width="820" height="110" rx="6" fill="#ffffff" stroke="#ffdce6" />
  <text x="48" y="142" font-size="14" font-family="Arial" fill="#555">测试常用网站与广告屏蔽效果，按需调整 proxy-groups 策略。</text>
  <text x="48" y="168" font-size="14" font-family="Arial" fill="#555">若 DNS 泄漏，可切换上游或调整客户端 DNS 设置。</text>
</svg>
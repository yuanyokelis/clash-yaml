  <text x="48" y="142" font-size="14" font-family="Arial" fill="#555">示意：左侧菜单 → Services → OpenClash</text>
  <text x="48" y="168" font-size="14" font-family="Arial" fill="#555">如果找不到，请确认已安装 OpenClash 插件。</text>

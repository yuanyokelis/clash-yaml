<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260">
  <rect width="100%" height="100%" fill="#f7f9fc" />
  <text x="30" y="48" font-size="20" font-family="Arial" fill="#111">OpenClash 导入（示意） — 步骤 1</text>
  <text x="30" y="88" font-size="16" font-family="Arial" fill="#333">打开路由器 LuCI 管理界面（例如 http://192.168.1.1）并登录。</text>
